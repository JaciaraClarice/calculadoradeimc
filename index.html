<!DOCTYPE html>
<html lang="pt-br">

<body>
    <h1>Calculadora de IMC</h1>
    <form>
        <label>Peso (Kg)</label> <input type="number" id="v1"/>
        <label>Altura (M)</label> <input type="number" id="v2"/>
        <button type="button" onclick="executar()">Executar</button>
    </form>

    <script src="EstruturasCondicionais.js"></script>
    <script>
        const executar = () => {
            const peso = Number(document.getElementById("v1").value);
            const altura = Number(document.getElementById("v2").value);
            const v_imc = imc (peso,altura);
            const v_sit = situacao (v_imc);
            alert (`IMC: ${v_imc.toFixed(2)} => Resultado ${v_sit}`);
        }
    </script>
</body>
</html>
