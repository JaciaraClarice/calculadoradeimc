<!DOCTYPE html>
<html lang="pt-br">

<body>
    <h1>Calculadora de IMC</h1>
    <form>
        <label>Peso (Kg)</label> <input type="number" id="v1"/>
        <label>Altura (M)</label> <input type="number" id="v2"/>
        <a href="#" onclick="executar()">Executar</a>
    </form>

    <script src="EstruturasCondicionais.js"></script>
    <script>
        const executar = () => {
            const peso = eval(document.getElementbyId("v1").value);
            const altura = eval(document.getElementbyId("v2").value);
            const v_imc = imc (peso,altura);
            const v_sit = situacao (v_imc);
            alert (`IMC: ${v_imc.toFixed(2)} :: Situação: ${v_sit}`);
        }
    </script>
</body>
</html>
